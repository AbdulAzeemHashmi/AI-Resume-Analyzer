<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Resume-Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600">AI Resume Analyzer</h1>
            <p class="text-gray-600 mt-2">Upload your resume, get AI feedback, download improved version</p>
        </header>

        <!-- Upload Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">📤 Upload Your Resume</h2>
            
            <div id="uploadArea" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition cursor-pointer">
                <div id="uploadPrompt">
                    <svg class="w-12 h-12 mx-auto text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="mt-2 text-gray-600">Drag &amp; drop your resume here, or click to browse</p>
                    <p class="text-sm text-gray-400 mt-1">Supports PDF and DOCX files</p>
                </div>
                <div id="uploadProgress" class="hidden">
                    <p class="text-gray-600">Uploading...</p>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 mt-2">
                        <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx" />
            
            <div id="fileInfo" class="hidden mt-4 p-3 bg-gray-50 rounded-lg">
                <p><strong>File:</strong> <span id="fileName"></span></p>
                <p><strong>Status:</strong> <span id="fileStatus" class="text-green-600">Uploaded successfully</span></p>
            </div>

            <button id="analyzeBtn" class="hidden mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                🧠 Analyze &amp; Improve Resume
            </button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4 text-red-600">⚠️ Weaknesses Found</h2>
                <ul id="weaknessesList" class="list-disc list-inside space-y-2 text-gray-700"></ul>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4 text-green-600">✅ Improved Resume</h2>
                <div id="improvedText" class="bg-gray-50 p-4 rounded-lg max-h-96 overflow-y-auto whitespace-pre-wrap text-sm text-gray-700"></div>
            </div>

            <button id="downloadBtn" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition text-lg font-semibold">
                📥 Download Improved Resume
            </button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mt-4"></div>
    </div>

    <script>
"use strict";
// ============================================
// DOM Elements
// ============================================
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileStatus = document.getElementById('fileStatus');
const analyzeBtn = document.getElementById('analyzeBtn');
const resultsSection = document.getElementById('resultsSection');
const weaknessesList = document.getElementById('weaknessesList');
const improvedText = document.getElementById('improvedText');
const downloadBtn = document.getElementById('downloadBtn');
const errorMessage = document.getElementById('errorMessage');
const uploadPrompt = document.getElementById('uploadPrompt');
const uploadProgress = document.getElementById('uploadProgress');
const progressBar = document.getElementById('progressBar');
// ============================================
// State
// ============================================
let uploadedText = '';
let uploadedFileType = '';
let uploadedFileName = '';
let weaknesses = [];
let improvedTextContent = '';
// ============================================
// Utility Functions
// ============================================
function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.remove('hidden');
    setTimeout(() => {
        errorMessage.classList.add('hidden');
    }, 5000);
}
function updateProgress(percent) {
    progressBar.style.width = `${percent}%`;
}
// ============================================
// File Upload
// ============================================
uploadArea.addEventListener('click', () => {
    fileInput.click();
});
uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('border-blue-500', 'bg-blue-50');
});
uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('border-blue-500', 'bg-blue-50');
});
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('border-blue-500', 'bg-blue-50');
    const files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length > 0) {
        handleFile(files[0]);
    }
});
fileInput.addEventListener('change', () => {
    if (fileInput.files && fileInput.files.length > 0) {
        handleFile(fileInput.files[0]);
    }
});
async function handleFile(file) {
    // Validate file type
    const validExtensions = ['.pdf', '.docx'];
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!validExtensions.includes(ext)) {
        showError('Please upload a PDF or DOCX file.');
        return;
    }
    // Show progress
    uploadPrompt.classList.add('hidden');
    uploadProgress.classList.remove('hidden');
    updateProgress(10);
    try {
        const formData = new FormData();
        formData.append('file', file);
        updateProgress(30);
        const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData
        });
        updateProgress(70);
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Upload failed');
        }
        const data = await response.json();
        if (!data.success) {
            throw new Error(data.error || 'Upload failed');
        }
        updateProgress(100);
        // Store uploaded data
        uploadedText = data.text;
        uploadedFileType = data.file_type;
        uploadedFileName = data.filename;
        // Show file info
        fileName.textContent = data.filename;
        fileInfo.classList.remove('hidden');
        analyzeBtn.classList.remove('hidden');
        // Reset progress
        setTimeout(() => {
            uploadPrompt.classList.remove('hidden');
            uploadProgress.classList.add('hidden');
            updateProgress(0);
        }, 500);
    }
    catch (error) {
        showError(error.message || 'Upload failed. Please try again.');
        uploadPrompt.classList.remove('hidden');
        uploadProgress.classList.add('hidden');
        updateProgress(0);
    }
}
// ============================================
// Analyze & Enhance
// ============================================
analyzeBtn.addEventListener('click', async () => {
    if (!uploadedText) {
        showError('Please upload a resume first.');
        return;
    }
    analyzeBtn.disabled = true;
    analyzeBtn.textContent = '⏳ Analyzing...';
    try {
        // Step 1: Analyze
        const analyzeResponse = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: uploadedText })
        });
        if (!analyzeResponse.ok) {
            const error = await analyzeResponse.json();
            throw new Error(error.error || 'Analysis failed');
        }
        const analyzeData = await analyzeResponse.json();
        if (!analyzeData.success) {
            throw new Error(analyzeData.error || 'Analysis failed');
        }
        weaknesses = analyzeData.weaknesses || [];
        // Step 2: Enhance
        const enhanceResponse = await fetch('/api/enhance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: uploadedText,
                weaknesses: weaknesses
            })
        });
        if (!enhanceResponse.ok) {
            const error = await enhanceResponse.json();
            throw new Error(error.error || 'Enhancement failed');
        }
        const enhanceData = await enhanceResponse.json();
        if (!enhanceData.success) {
            throw new Error(enhanceData.error || 'Enhancement failed');
        }
        improvedTextContent = enhanceData.improved_text || '';
        // Display results
        displayResults();
    }
    catch (error) {
        showError(error.message || 'Processing failed. Please try again.');
    }
    finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = '🧠 Analyze & Improve Resume';
    }
});
function displayResults() {
    // Show weaknesses
    weaknessesList.innerHTML = '';
    if (weaknesses.length > 0) {
        weaknesses.forEach(w => {
            const li = document.createElement('li');
            li.textContent = w;
            weaknessesList.appendChild(li);
        });
    }
    else {
        const li = document.createElement('li');
        li.textContent = 'No weaknesses found. Great resume!';
        weaknessesList.appendChild(li);
    }
    // Show improved text
    improvedText.textContent = improvedTextContent || 'No improved text generated.';
    // Show results section
    resultsSection.classList.remove('hidden');
    resultsSection.scrollIntoView({ behavior: 'smooth' });
}
// ============================================
// Download
// ============================================
downloadBtn.addEventListener('click', async () => {
    if (!improvedTextContent) {
        showError('No improved resume to download.');
        return;
    }
    downloadBtn.disabled = true;
    downloadBtn.textContent = '⏳ Generating...';
    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: improvedTextContent,
                file_type: uploadedFileType || 'pdf'
            })
        });
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Download failed');
        }
        // Download the file
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `improved_resume.${uploadedFileType || 'pdf'}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }
    catch (error) {
        showError(error.message || 'Download failed. Please try again.');
    }
    finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = '📥 Download Improved Resume';
    }
});
    </script>
</body>
</html>
